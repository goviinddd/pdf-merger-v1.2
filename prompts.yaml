extract_po_number: |
  Extract the Purchase Order (PO) Number.
  Look for labels like "PO Number", "Order #", "P.O.", "Procurement Ref".
  Return ONLY JSON: {"po_number": "value"}
  If NOT found, return {"po_number": null}

extract_line_items_crop: |
  Extract table rows into a JSON list.
    
    ⛔ NEGATIVE CONSTRAINTS:
    1. IGNORE "Hazardous Materials", "Prohibited Substances", "Terms and Conditions".
    2. IGNORE columns labeled "Item No" if they contain long codes (e.g., 5060800...). That is a Part Number, NOT a Line Number.
    
    ✅ POSITIVE EXTRACTION RULES (STRICT PRIORITY FOR LINE NUMBER):
    1. **HIGHEST PRIORITY:** Look inside the 'Description' text. If you see "Line Item - X", use 'X'.
    2. **SECOND PRIORITY:** Look for a simple column labeled "Line" or "No" that contains small integers (1, 2, 3 or 1-1, 1-2, 1-3).
    3. **CRITICAL:** Do NOT use the "Item No" or "Part No" column as the line reference.
    
    Output JSON list: [{"line_ref": "2", "description": "Item Name", "part_no": "5060900...", "quantity": "4"}]
    """

extract_line_items_full_page: |
  Analyze this document. Identify the main table.
    
    ⛔ NEGATIVE CONSTRAINTS:
    1. IGNORE "Hazardous Materials", "Prohibited Substances", "Terms and Conditions".
    2. IGNORE columns labeled "Item No" if they contain long codes (e.g., 5060800...). That is a Part Number, NOT a Line Number.
    
    ✅ POSITIVE EXTRACTION RULES (STRICT PRIORITY FOR LINE NUMBER):
    1. **HIGHEST PRIORITY:** Look inside the 'Description' text. If you see "Line Item - X", use 'X'.
    2. **SECOND PRIORITY:** Look for a simple column labeled "Line", "No", "SNO", or "Sl No" that contains small integers (1, 2, 3).
    3. **CRITICAL:** Do NOT use the "Item No" or "Part No" column as the line reference.
    
    Output JSON list: [{"line_ref": "2", "description": "Item Name", "part_no": "5060900...", "quantity": "4"}]
    Return [] if no valid table is found.

classify_document: |
  Classify this document image. Return ONLY one string:
  "purchase_order", "delivery_note", "sales_invoice", or "unknown".